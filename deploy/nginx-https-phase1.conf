# =============================================================================
# PHASE 1 — Use BEFORE you have TLS certificates (Let’s Encrypt).
# Replace every chat.example.com with your real hostname (same as DNS A record).
# Disable any old site that binds default_server on :80 if nginx complains.
#
#   sudo cp deploy/nginx-https-phase1.conf /etc/nginx/sites-available/chat.conf
#   sudo ln -sf /etc/nginx/sites-available/chat.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then obtain a certificate (pick ONE):
#   sudo mkdir -p /var/www/certbot/.well-known/acme-challenge
#   sudo certbot certonly --webroot -w /var/www/certbot -d chat.example.com
#
# Or (if you prefer the nginx plugin; may edit this file in place):
#   sudo apt install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d chat.example.com
#
# After certs exist under /etc/letsencrypt/live/chat.example.com/, switch to
# deploy/nginx-chat-https.conf (Phase 2).
# =============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name chat.example.com;

    root /var/www/react-chat/dist;
    index index.html;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        allow all;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /media/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50m;
    }

    location /ws {
        proxy_pass http://127.0.0.1:12346/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
