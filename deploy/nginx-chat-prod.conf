# HTTP-only (IP or quick lab). For HTTPS + WSS use instead:
#   deploy/nginx-https-phase1.conf  (before certificates)
#   deploy/nginx-chat-https.conf    (after certificates)
#   deploy/HTTPS-SETUP.txt          (step list)
#
# sudo cp deploy/nginx-chat-prod.conf /etc/nginx/sites-available/chat.conf
# sudo ln -sf /etc/nginx/sites-available/chat.conf /etc/nginx/sites-enabled/
# Put React build on the server: /var/www/react-chat/dist (index.html + assets/)
# sudo nginx -t && sudo systemctl reload nginx
# sudo ufw allow 80/tcp   # if UFW is used

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 89.167.92.11 _;

    root /var/www/react-chat/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /media/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50m;
    }

    location /ws {
        proxy_pass http://127.0.0.1:12346/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
