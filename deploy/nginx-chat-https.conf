# =============================================================================
# PHASE 2 — HTTPS + WSS (after certificates exist).
# Replace chat.example.com with your hostname (must match cert CN/SAN).
#
#   sudo mkdir -p /var/www/certbot/.well-known/acme-challenge
#   sudo cp deploy/nginx-chat-https.conf /etc/nginx/sites-available/chat.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Open port 443: sudo ufw allow 443/tcp
# Hetzner Cloud: allow TCP 443 in the firewall UI if you use it.
# =============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name chat.example.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chat.example.com;

    ssl_certificate     /etc/letsencrypt/live/chat.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    # If this file is missing, run: sudo openssl dhparam -out /etc/letsencrypt/ssl-dhparams.pem 2048
    # or comment the next line.
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /var/www/react-chat/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /media/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        client_max_body_size 50m;
    }

    location /ws {
        proxy_pass http://127.0.0.1:12346/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400;
    }
}
